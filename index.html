<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Community - Chaos Edition</title>
    <style>
        :root { --bg-color: #0d0d0d; --card-bg: #1a1a1a; --primary-red: #8b0000; --accent-red: #ff3333; --gold: #d4af37; --fox: #e67e22; --vampire: #9b59b6; --baker: #f1c40f; --teruteru: #ecf0f1; }
        body { font-family: sans-serif; background: var(--bg-color); color: white; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: rgba(20, 20, 20, 0.9); padding: 20px; border-radius: 20px; border: 1px solid #441111; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h1 { font-size: 1.5rem; color: var(--accent-red); text-shadow: 0 0 10px rgba(255,0,0,0.5); margin-bottom: 20px; border-bottom: 2px solid var(--primary-red); padding-bottom: 10px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .setup-box { background: rgba(40, 0, 0, 0.3); padding: 10px; border-radius: 10px; border: 1px solid var(--primary-red); margin: 10px 0; max-height: 300px; overflow-y: auto; }
        .role-row { display: flex; justify-content: space-between; align-items: center; margin: 5px 0; border-bottom: 1px solid #333; padding-bottom: 3px; font-size: 0.9rem; }
        .count-controls { display: flex; align-items: center; gap: 8px; }
        .count-btn { width: 25px; height: 25px; background: #444; border: 1px solid #666; color: white; border-radius: 5px; cursor: pointer; }
        button.main-btn { background: linear-gradient(135deg, var(--primary-red), #440000); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .player-card { background: var(--card-bg); margin: 5px 0; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; border-left: 4px solid var(--primary-red); }
        .dead { opacity: 0.4; filter: grayscale(1); border-left-color: #444; }
        .my-role-box { background: linear-gradient(to right, #2c0000, #1a1a1a); padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid var(--gold); }
        .hidden { display: none !important; }
        .action-btn { background: transparent; border: 1px solid var(--gold); color: white; margin: 5px; padding: 10px; width: 45%; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }
        #status-label { background: #222; padding: 5px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 5px; text-align: center; color: var(--gold); }
        #event-log { background: rgba(241, 196, 15, 0.1); border: 1px solid var(--baker); padding: 8px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 10px; text-align: center; color: var(--baker); }
        .role-desc { font-size: 0.75rem; color: #ccc; margin-top: 3px; line-height: 1.2; }
        .night-result { color: #2ecc71; margin-top: 10px; font-weight: bold; }
        
        #victory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; color: var(--gold); padding: 20px; box-sizing: border-box; }
        .vic-msg { font-size: 2rem; font-weight: bold; text-shadow: 0 0 20px var(--gold); margin-bottom: 10px; }
        .vic-sub { font-size: 1rem; color: white; line-height: 1.6; max-height: 60vh; overflow-y: auto; width: 100%; }
    </style>
</head>
<body>

<div id="login-screen" class="container">
    <h1>WOLF COMMUNITY</h1>
    <div id="host-only-badge" class="hidden" style="color:var(--gold); font-size:0.8rem; margin-bottom:10px; text-align:center;">【ホストモード】</div>
    <input type="text" id="room-id" placeholder="合言葉 (Room ID)">
    <input type="text" id="player-name" placeholder="あなたの名前">
    <button id="join-btn" class="main-btn">入室する</button>
</div>

<div id="game-screen" class="container hidden">
    <div id="status-label">待機中</div>
    <div id="event-log" class="hidden"></div>
    
    <div id="host-panel" class="hidden">
        <div id="setup-area" class="setup-box">
            <p style="color: var(--gold); margin: 0 0 5px 0; font-weight: bold; font-size: 0.8rem;">役職構成</p>
            <div id="role-list"></div>
            <button id="start-game-btn" class="main-btn" style="padding:10px;">ゲーム開始</button>
        </div>
        <div id="host-controls" class="hidden" style="display:flex; gap:5px;">
            <button id="host-vote-btn" class="main-btn" style="background:#e74c3c; flex:1; padding:10px;">全員投票開始</button>
            <button id="host-next-btn" class="main-btn" style="background:#2c3e50; flex:1; padding:10px;">夜へ</button>
        </div>
    </div>

    <div id="role-display" class="my-role-box hidden">
        <span style="font-size: 0.7rem; color: #aaa;">あなたの役職</span><br>
        <strong id="my-role-name" style="font-size: 1.4rem; color: var(--gold);">? ? ?</strong>
        <div id="my-role-desc" class="role-desc"></div>
        <div id="teammate-info" style="font-size: 0.85rem; color: #ff4444; margin-top:5px;"></div>
    </div>

    <div id="action-panel" class="hidden" style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; border:1px solid var(--gold); margin-bottom:10px;">
        <p id="action-msg" style="font-weight:bold; margin:0 0 10px 0; font-size:0.9rem;"></p>
        <div id="action-buttons"></div>
    </div>

    <div id="player-list"></div>
</div>

<div id="victory-screen" class="hidden">
    <div class="vic-msg" id="vic-main"></div>
    <div class="vic-sub" id="vic-sub"></div>
    <button onclick="location.reload()" class="main-btn" style="width:200px; margin-top:30px;">タイトルに戻る</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDlorUmU3Ik_7-FG_S6VoylkM5ivYvuOoA",
        authDomain: "my-jinro-game.firebaseapp.com",
        projectId: "my-jinro-game",
        databaseURL: "https://my-jinro-game-default-rtdb.firebaseio.com",
        storageBucket: "my-jinro-game.firebasestorage.app",
        messagingSenderId: "534900473912",
        appId: "1:534900473912:web:18feed00b63f5879d466cd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const isHostMode = urlParams.get('mode') === 'host';
    if (isHostMode) document.getElementById('host-only-badge').classList.remove('hidden');

    let myName = "", currentRoom = "";
    const rolesData = [
        { id: 'wolf', name: '人狼', count: 1, desc: '仲間の人狼と協力して、村人を襲撃します。' },
        { id: 'uranai', name: '占い師', count: 1, desc: '毎晩一人の正体を知ることができます。' },
        { id: 'reibai', name: '霊媒師', count: 1, desc: '昼に処刑された人が人狼だったかを知ることができます。' },
        { id: 'kishi', name: '騎士', count: 1, desc: '毎晩一人の人を襲撃から守れます（自分以外）。' },
        { id: 'baker', name: 'パン屋', count: 1, desc: 'あなたが生存している限り、毎朝村にパンが届きます。' },
        { id: 'teruteru', name: 'てるてる', count: 0, desc: '【第3陣営】処刑されるか、最後まで生き残ると勝利です。' },
        { id: 'kyojin', name: '狂人', count: 0, desc: '人狼の味方をする人間。占われても人間と出ます。' },
        { id: 'vampire', name: '吸血鬼', count: 0, desc: '【第3陣営】最後まで生存すれば勝利。' },
        { id: 'fox', name: '妖狐', count: 0, desc: '【第3陣営】占われると死にますが襲撃では死にません。' },
        { id: 'wolf_kishi', name: '人狼と出る騎士', count: 0, desc: '守る能力がありますが、占われると人狼と出ます。' },
        { id: 'lover', name: '恋人', count: 0, desc: '相方と二人で最後まで生き残りを目指します。' }
    ];

    function renderRoleSetup() {
        const div = document.getElementById('role-list'); div.innerHTML = "";
        rolesData.forEach(role => {
            const row = document.createElement('div'); row.className = 'role-row';
            row.innerHTML = `<span>${role.name}</span><div class="count-controls"><button class="count-btn" data-id="${role.id}" data-delta="-1">-</button><span id="count-${role.id}">${role.count}</span><button class="count-btn" data-id="${role.id}" data-delta="1">+</button></div>`;
            div.appendChild(row);
        });
    }

    document.addEventListener('click', e => {
        if (e.target.classList.contains('count-btn')) {
            const id = e.target.dataset.id;
            const role = rolesData.find(r => r.id === id);
            role.count = Math.max(0, role.count + parseInt(e.target.dataset.delta));
            document.getElementById(`count-${id}`).innerText = role.count;
        }
    });

    document.getElementById('host-vote-btn').onclick = () => {
        update(ref(db, `rooms/${currentRoom}/config`), { phase: "voting" });
    };

    document.getElementById('host-next-btn').onclick = () => {
        onValue(ref(db, `rooms/${currentRoom}/config`), s => {
            const phase = s.val().phase;
            if (phase === "playing") {
                update(ref(db, `rooms/${currentRoom}/config`), { phase: "night" });
            } else if (phase === "night") {
                onValue(ref(db, `rooms/${currentRoom}`), roomS => {
                    processMorning(roomS.val().players, roomS.val().config);
                }, { onlyOnce: true });
            }
        }, { onlyOnce: true });
    };

    document.getElementById('join-btn').onclick = () => {
        const roomId = document.getElementById('room-id').value;
        myName = document.getElementById('player-name').value;
        if (!roomId || !myName) return alert("入力してください");
        currentRoom = roomId;

        set(ref(db, `rooms/${roomId}/players/${myName}`), { name: myName, role: "未割当", alive: true, vote: "", nightAction: "" });
        onDisconnect(ref(db, `rooms/${roomId}/players/${myName}`)).remove();

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');

        if (isHostMode) {
            document.getElementById('host-panel').classList.remove('hidden');
            renderRoleSetup();
            update(ref(db, `rooms/${roomId}/config`), { phase: "waiting", bakerMsg: "" });
        }

        onValue(ref(db, `rooms/${roomId}`), snapshot => {
            const data = snapshot.val(); if (!data) return;
            const players = data.players || {};
            const config = data.config || {};
            const myData = players[myName];

            checkGameEnd(players, config);

            const phaseLabel = { waiting: "待機中", playing: "🗣️ 話し合い中", voting: "⚖️ 投票中", night: "🌙 夜の行動中" };
            document.getElementById('status-label').innerText = phaseLabel[config.phase] || "不明";

            if (config.bakerMsg) {
                document.getElementById('event-log').innerText = config.bakerMsg;
                document.getElementById('event-log').classList.remove('hidden');
            } else {
                document.getElementById('event-log').classList.add('hidden');
            }

            const listDiv = document.getElementById('player-list'); listDiv.innerHTML = "";
            Object.keys(players).forEach(n => {
                listDiv.innerHTML += `<div class="player-card ${players[n].alive ? '' : 'dead'}"><span>👤 ${n}</span><span>${players[n].alive ? '生存' : '死亡'}</span></div>`;
            });

            if (myData && myData.role !== "未割当") {
                document.getElementById('role-display').classList.remove('hidden');
                document.getElementById('my-role-name').innerText = myData.role;
                const roleObj = rolesData.find(r => r.name === myData.role);
                document.getElementById('my-role-desc').innerText = roleObj ? roleObj.desc : "";
            }

            const actionPanel = document.getElementById('action-panel');
            const btnArea = document.getElementById('action-buttons');
            const msg = document.getElementById('action-msg');
            
            if (myData && myData.alive) {
                if (config.phase === "voting") {
                    actionPanel.classList.remove('hidden');
                    msg.innerText = "【投票】追放する人を1人選んでください";
                    btnArea.innerHTML = "";
                    Object.keys(players).forEach(n => {
                        if (players[n].alive && n !== myName) {
                            const b = document.createElement('button'); b.innerText = n; b.className = "action-btn";
                            b.onclick = () => {
                                update(ref(db, `rooms/${currentRoom}/players/${myName}`), { vote: n });
                                btnArea.innerHTML = "<p>投票しました。全員が終わるまでお待ちください。</p>";
                            };
                            btnArea.appendChild(b);
                        }
                    });
                } else if (config.phase === "night") {
                    actionPanel.classList.remove('hidden');
                    btnArea.innerHTML = "";
                    
                    if (myData.role === "人狼") {
                        msg.innerText = "【襲撃】今夜殺す人を選択";
                        Object.keys(players).forEach(n => {
                            if (players[n].alive && players[n].role !== "人狼") {
                                const b = document.createElement('button'); b.innerText = n; b.className = "action-btn";
                                b.onclick = () => { update(ref(db, `rooms/${currentRoom}/players/${myName}`), { nightAction: n }); btnArea.innerHTML = "襲撃待機中..."; };
                                btnArea.appendChild(b);
                            }
                        });
                    } else if (myData.role === "占い師") {
                        msg.innerText = "【占い】正体を見る人を選択";
                        Object.keys(players).forEach(n => {
                            if (players[n].alive && n !== myName) {
                                const b = document.createElement('button'); b.innerText = n; b.className = "action-btn";
                                b.onclick = () => {
                                    const target = players[n];
                                    if (target.role === "妖狐") update(ref(db, `rooms/${currentRoom}/config`), { foxKilled: n });
                                    const res = (target.role === "人狼" || target.role === "人狼と出る騎士") ? "【人狼】" : "【人間】";
                                    btnArea.innerHTML = `<p class="night-result">${n}さんは ${res} です</p>`;
                                };
                                btnArea.appendChild(b);
                            }
                        });
                    } else if (myData.role === "騎士" || myData.role === "人狼と出る騎士") {
                        msg.innerText = "【護衛】守る人を選択（自分以外）";
                        Object.keys(players).forEach(n => {
                            if (players[n].alive && n !== myName) {
                                const b = document.createElement('button'); b.innerText = n; b.className = "action-btn";
                                b.onclick = () => { update(ref(db, `rooms/${currentRoom}/players/${myName}`), { nightAction: n }); btnArea.innerHTML = "護衛中..."; };
                                btnArea.appendChild(b);
                            }
                        });
                    } else {
                        // 【追加】市民側の「怪しい人選択」
                        msg.innerText = "【推理】今、誰が怪しいと思いますか？";
                        Object.keys(players).forEach(n => {
                            if (players[n].alive && n !== myName) {
                                const b = document.createElement('button'); b.innerText = n; b.className = "action-btn";
                                b.onclick = () => { btnArea.innerHTML = `<p class="night-result">${n}さんを怪しんでいます...</p>`; };
                                btnArea.appendChild(b);
                            }
                        });
                    }
                } else {
                    actionPanel.classList.add('hidden');
                }
            } else {
                actionPanel.classList.add('hidden');
            }

            if (isHostMode) {
                const controls = document.getElementById('host-controls');
                if (config.phase === "playing") {
                    controls.classList.remove('hidden');
                    document.getElementById('host-vote-btn').classList.remove('hidden');
                    document.getElementById('host-next-btn').innerText = "夜へ";
                } else if (config.phase === "night") {
                    controls.classList.remove('hidden');
                    document.getElementById('host-vote-btn').classList.add('hidden');
                    document.getElementById('host-next-btn').innerText = "夜明け（結果表示）";
                } else {
                    controls.classList.add('hidden');
                }
                if (config.phase === "voting") checkTally(players, currentRoom);
            }
        });
    };

    document.getElementById('start-game-btn').onclick = () => {
        onValue(ref(db, `rooms/${currentRoom}/players`), s => {
            const names = Object.keys(s.val());
            let roles = [];
            rolesData.forEach(r => { for(let i=0; i<r.count; i++) roles.push(r.name); });
            while(roles.length < names.length) roles.push("市民");
            roles.sort(() => Math.random() - 0.5);
            let up = { "config/phase": "playing", "config/lastDead": "", "config/foxKilled": "", "config/bakerMsg": "" };
            names.forEach((n, i) => { up[`players/${n}/role`] = roles[i]; up[`players/${n}/alive`] = true; up[`players/${n}/vote`] = ""; up[`players/${n}/nightAction`] = ""; });
            update(ref(db, `rooms/${currentRoom}`), up);
            document.getElementById('setup-area').classList.add('hidden');
        }, { onlyOnce: true });
    };

    function processMorning(players, config) {
        const alives = Object.keys(players).filter(n => players[n].alive);
        const wolfActions = alives.filter(n => players[n].role === "人狼").map(n => players[n].nightAction).filter(a => a !== "");
        const kishiGuards = alives.filter(n => players[n].role === "騎士" || players[n].role === "人狼と出る騎士").map(n => players[n].nightAction);
        let wolfTarget = wolfActions.length > 0 ? wolfActions[Math.floor(Math.random() * wolfActions.length)] : "";
        let foxKilled = config.foxKilled || "";
        let deads = [];
        if (wolfTarget && !kishiGuards.includes(wolfTarget) && players[wolfTarget].role !== "妖狐") deads.push(wolfTarget);
        if (foxKilled && !deads.includes(foxKilled)) deads.push(foxKilled);

        const bakerAlive = alives.filter(n => players[n].role === "パン屋" && !deads.includes(n)).length > 0;
        let up = { "config/phase": "playing", "config/foxKilled": "", "config/bakerMsg": bakerAlive ? "🍞 パン屋から美味しいパンが届きました。" : "🍞 今日はパンが届きませんでした。" };
        deads.forEach(d => { up[`players/${d}/alive`] = false; });
        alives.forEach(n => { up[`players/${n}/nightAction`] = ""; up[`players/${n}/vote`] = ""; });
        update(ref(db, `rooms/${currentRoom}`), up);
        alert(deads.length > 0 ? "犠牲者: " + deads.join(", ") : "昨晩の犠牲者はいませんでした。");
    }

    function checkTally(players, rId) {
        const alives = Object.keys(players).filter(n => players[n].alive);
        const votes = alives.map(n => players[n].vote).filter(v => v !== "");
        if (votes.length > 0 && votes.length === alives.length) {
            let counts = {}; votes.forEach(v => counts[v] = (counts[v] || 0) + 1);
            const target = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            if (players[target].role === "てるてる") { checkGameEnd(players, {phase: "playing"}, target); return; }
            let up = { "config/phase": "playing", "config/lastDead": target, "config/bakerMsg": "" };
            up[`players/${target}/alive`] = false;
            alives.forEach(n => up[`players/${n}/vote`] = "");
            update(ref(db, `rooms/${rId}`), up);
            alert(target + "さんを追放しました。");
        }
    }

    function checkGameEnd(players, config, executedTeruteru = null) {
        if (!config || config.phase === "waiting") return false;
        const aliveNames = Object.keys(players).filter(n => players[n].alive);
        const wolves = aliveNames.filter(n => players[n].role === "人狼" || players[n].role === "人狼と出る騎士");
        const foxes = aliveNames.filter(n => players[n].role === "妖狐");
        const vampires = aliveNames.filter(n => players[n].role === "吸血鬼");
        const teruterus = aliveNames.filter(n => players[n].role === "てるてる");
        const humans = aliveNames.filter(n => !["人狼", "人狼と出る騎士", "妖狐", "吸血鬼"].includes(players[n].role));

        let winner = "";
        if (executedTeruteru) winner = "てるてる";
        else if (wolves.length === 0) winner = "市民チーム";
        else if (wolves.length >= humans.length) winner = "人狼チーム";

        if (!winner) return false;

        let final = winner + "の勝利！";
        if (winner !== "てるてる") {
            let extras = [];
            if (foxes.length > 0) extras.push("妖狐");
            if (vampires.length > 0) extras.push("吸血鬼");
            if (teruterus.length > 0) extras.push("てるてる");
            if (extras.length > 0) final = extras.join("と") + "の勝利！";
        }

        document.getElementById('vic-main').innerText = final;
        let list = ""; Object.keys(players).forEach(n => list += `${n}: ${players[n].role}<br>`);
        document.getElementById('vic-sub').innerHTML = list;
        document.getElementById('victory-screen').classList.remove('hidden');
        return true;
    }
</script>
</body>
</html>
