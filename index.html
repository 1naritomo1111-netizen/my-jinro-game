<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Community - Realtime Edition</title>
    <style>
        :root { --bg-color: #0d0d0d; --card-bg: #1a1a1a; --primary-red: #8b0000; --accent-red: #ff3333; --gold: #d4af37; }
        body { font-family: sans-serif; background: var(--bg-color); color: white; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: rgba(20, 20, 20, 0.9); padding: 20px; border-radius: 20px; border: 1px solid #441111; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h1 { font-size: 1.5rem; color: var(--accent-red); text-shadow: 0 0 10px rgba(255,0,0,0.5); margin-bottom: 20px; border-bottom: 2px solid var(--primary-red); padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .setup-box { background: rgba(40, 0, 0, 0.3); padding: 15px; border-radius: 10px; border: 1px solid var(--primary-red); margin: 10px 0; }
        .role-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .count-controls { display: flex; align-items: center; gap: 10px; }
        .count-btn { width: 30px; height: 30px; background: #444; border: 1px solid #666; color: white; border-radius: 5px; cursor: pointer; }
        button.main-btn { background: linear-gradient(135deg, var(--primary-red), #440000); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .player-card { background: var(--card-bg); margin: 5px 0; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; border-left: 4px solid var(--primary-red); }
        .my-role-box { background: linear-gradient(to right, #2c0000, #1a1a1a); padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid var(--gold); text-align: left; }
        .hidden { display: none !important; }
        .vote-btn { background: transparent; border: 1px solid var(--accent-red); margin: 5px; padding: 10px; color: white; width: 45%; border-radius: 5px; }
        #teammate-info { font-weight: bold; color: #ff4444; margin-top: 10px; font-size: 0.95rem; text-shadow: 0 0 5px rgba(255,0,0,0.3); }
    </style>
</head>
<body>

<div id="login-screen" class="container">
    <h1>WOLF COMMUNITY</h1>
    <div id="host-only-badge" class="hidden" style="color:var(--gold); font-size:0.8rem; margin-bottom:10px;">【ホストモード】</div>
    <input type="text" id="room-id" placeholder="合言葉 (Room ID)">
    <input type="text" id="player-name" placeholder="あなたの名前">
    <button id="join-btn" class="main-btn">入室する</button>
</div>

<div id="game-screen" class="container hidden">
    <h2 style="font-size: 0.9rem; color: #888;">ROOM: <span id="display-room" style="color: white;"></span></h2>
    
    <div id="host-panel" class="hidden">
        <div class="setup-box">
            <p style="color: var(--gold); margin: 0 0 10px 0; font-weight: bold;">役職人数設定</p>
            <div id="role-list"></div>
            <button id="start-game-btn" class="main-btn" style="background: var(--gold); color: black;">配役を開始</button>
        </div>
        <button id="open-vote-btn" class="main-btn hidden" style="background: #3498db;">議論終了・投票開始</button>
    </div>

    <div id="participant-msg" class="hidden" style="background: #222; padding: 15px; border-radius: 10px; margin-bottom: 10px;">
        <p style="color: #f1c40f; margin: 0;">ホストが設定中です...</p>
    </div>

    <div id="role-display" class="my-role-box hidden">
        <span style="font-size: 0.7rem; color: #aaa;">あなたの役職</span><br>
        <strong id="my-role-name" style="font-size: 1.4rem; color: var(--gold);">? ? ?</strong>
        <div id="teammate-info"></div>
    </div>

    <div id="player-list"></div>
    <div id="vote-panel" class="hidden">
        <p style="color: var(--accent-red); font-weight: bold;">処刑投票：対象を選択</p>
        <div id="vote-buttons"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // あなたのFirebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDlorUmU3Ik_7-FG_S6VoylkM5ivYvuOoA",
        authDomain: "my-jinro-game.firebaseapp.com",
        projectId: "my-jinro-game",
        databaseURL: "https://my-jinro-game-default-rtdb.firebaseio.com",
        storageBucket: "my-jinro-game.firebasestorage.app",
        messagingSenderId: "534900473912",
        appId: "1:534900473912:web:18feed00b63f5879d466cd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const isHostMode = urlParams.get('mode') === 'host';
    if (isHostMode) document.getElementById('host-only-badge').classList.remove('hidden');

    let myName = "", currentRoom = "";
    const rolesData = [
        { id: 'wolf', name: '人狼', count: 1 },
        { id: 'uranai', name: '占い師', count: 1 },
        { id: 'reibai', name: '霊媒師', count: 0 },
        { id: 'kishi', name: '騎士', count: 0 },
        { id: 'lover', name: '恋人', count: 0 },
        { id: 'multi', name: '多重人格', count: 0 }
    ];

    function renderRoleSetup() {
        const div = document.getElementById('role-list');
        div.innerHTML = "";
        rolesData.forEach(role => {
            const row = document.createElement('div');
            row.className = 'role-row';
            row.innerHTML = `<span>${role.name}</span>
                <div class="count-controls">
                    <button class="count-btn" data-id="${role.id}" data-delta="-1">-</button>
                    <span id="count-${role.id}">${role.count}</span>
                    <button class="count-btn" data-id="${role.id}" data-delta="1">+</button>
                </div>`;
            div.appendChild(row);
        });
    }

    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('count-btn')) {
            const id = e.target.dataset.id;
            const delta = parseInt(e.target.dataset.delta);
            const role = rolesData.find(r => r.id === id);
            role.count = Math.max(0, role.count + delta);
            document.getElementById(`count-${id}`).innerText = role.count;
        }
    });

    document.getElementById('join-btn').onclick = () => {
        const roomId = document.getElementById('room-id').value;
        myName = document.getElementById('player-name').value;
        if (!roomId || !myName) return alert("入力してください");
        currentRoom = roomId;

        const myPlayerRef = ref(db, `rooms/${roomId}/players/${myName}`);
        set(myPlayerRef, { name: myName, role: "未割当", alive: true, vote: "" });
        onDisconnect(myPlayerRef).remove();

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('display-room').innerText = roomId;

        if (isHostMode) {
            document.getElementById('host-panel').classList.remove('hidden');
            renderRoleSetup();
            update(ref(db, `rooms/${roomId}/config`), { phase: "waiting" });
        } else {
            document.getElementById('participant-msg').classList.remove('hidden');
        }

        onValue(ref(db, `rooms/${roomId}`), (snapshot) => {
            const data = snapshot.val(); if (!data) return;
            const players = data.players || {};
            const config = data.config || {};

            // プレイヤーリスト表示
            const listDiv = document.getElementById('player-list');
            listDiv.innerHTML = "";
            Object.keys(players).forEach(n => {
                const p = players[n];
                listDiv.innerHTML += `<div class="player-card ${p.alive ? '' : 'dead'}"><span>👤 ${n}</span><span>${p.alive ? '生存' : '追放'}</span></div>`;
            });

            // 役職表示 & 仲間確認（パッと出るように最適化）
            const myData = players[myName];
            if (myData && myData.role !== "未割当") {
                document.getElementById('role-display').classList.remove('hidden');
                document.getElementById('my-role-name').innerText = myData.role;
                
                // 仲間探査ロジック
                let info = "";
                const allNames = Object.keys(players);
                if (myData.role === "人狼") {
                    const friends = allNames.filter(n => players[n].role === "人狼" && n !== myName);
                    info = friends.length > 0 ? "仲間の人狼: " + friends.join(", ") : "仲間の人狼はいません";
                } else if (myData.role === "多重人格") {
                    const masters = allNames.filter(n => players[n].role === "人狼");
                    info = "ご主人様(人狼): " + (masters.join(", ") || "不明");
                } else if (myData.role === "恋人") {
                    const partners = allNames.filter(n => players[n].role === "恋人" && n !== myName);
                    info = "相方: " + (partners.join(", ") || "不在");
                }
                document.getElementById('teammate-info').innerText = info;
            }

            if (config.phase === "playing") {
                document.getElementById('participant-msg').classList.add('hidden');
                if(isHostMode) document.getElementById('open-vote-btn').classList.remove('hidden');
                if(isHostMode) document.getElementById('start-game-btn').classList.add('hidden');
            }

            if (config.phase === "voting" && players[myName].alive) {
                showVotePanel(players);
            } else {
                document.getElementById('vote-panel').classList.add('hidden');
            }

            if (isHostMode && config.phase === "voting") checkTally(players, roomId);
        });
    };

    document.getElementById('start-game-btn').onclick = () => {
        onValue(ref(db, `rooms/${currentRoom}/players`), (s) => {
            const names = Object.keys(s.val());
            let roles = [];
            rolesData.forEach(r => { for(let i=0; i<r.count; i++) roles.push(r.name); });
            while(roles.length < names.length) roles.push("市民");
            roles.sort(() => Math.random() - 0.5);
            let up = { "config/phase": "playing" };
            names.forEach((n, i) => { up[`players/${n}/role`] = roles[i]; });
            update(ref(db, `rooms/${currentRoom}`), up);
        }, { onlyOnce: true });
    };

    document.getElementById('open-vote-btn').onclick = () => {
        update(ref(db, `rooms/${currentRoom}/config`), { phase: "voting" });
    };

    function showVotePanel(players) {
        document.getElementById('vote-panel').classList.remove('hidden');
        const btnArea = document.getElementById('vote-buttons');
        btnArea.innerHTML = "";
        Object.keys(players).forEach(n => {
            if (players[n].alive && n !== myName) {
                const b = document.createElement('button');
                b.innerText = n; b.className = "vote-btn";
                b.onclick = () => {
                    update(ref(db, `rooms/${currentRoom}/players/${myName}`), { vote: n });
                    btnArea.innerHTML = "<p>投票完了。結果を待て...</p>";
                };
                btnArea.appendChild(b);
            }
        });
    }

    function checkTally(players, rId) {
        const alivePlayers = Object.keys(players).filter(n => players[n].alive);
        const votes = alivePlayers.map(n => players[n].vote).filter(v => v !== "");
        if (votes.length > 0 && votes.length === alivePlayers.length) {
            let counts = {};
            votes.forEach(v => counts[v] = (counts[v] || 0) + 1);
            const target = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            const up = { "config/phase": "playing" };
            up[`players/${target}/alive`] = false;
            alivePlayers.forEach(n => up[`players/${n}/vote`] = "");
            update(ref(db, `rooms/${rId}`), up);
        }
    }
</script>
</body>
</html>
