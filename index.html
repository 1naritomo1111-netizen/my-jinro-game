<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Community - Random Hunt Edition</title>
    <style>
        :root { --bg-color: #0d0d0d; --card-bg: #1a1a1a; --primary-red: #8b0000; --accent-red: #ff3333; --gold: #d4af37; --blue: #3498db; }
        body { font-family: sans-serif; background: var(--bg-color); color: white; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: rgba(20, 20, 20, 0.9); padding: 20px; border-radius: 20px; border: 1px solid #441111; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h1 { font-size: 1.5rem; color: var(--accent-red); text-shadow: 0 0 10px rgba(255,0,0,0.5); margin-bottom: 20px; border-bottom: 2px solid var(--primary-red); padding-bottom: 10px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .setup-box { background: rgba(40, 0, 0, 0.3); padding: 15px; border-radius: 10px; border: 1px solid var(--primary-red); margin: 10px 0; }
        .role-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .count-controls { display: flex; align-items: center; gap: 10px; }
        .count-btn { width: 30px; height: 30px; background: #444; border: 1px solid #666; color: white; border-radius: 5px; cursor: pointer; }
        button.main-btn { background: linear-gradient(135deg, var(--primary-red), #440000); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .player-card { background: var(--card-bg); margin: 5px 0; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; border-left: 4px solid var(--primary-red); }
        .dead { opacity: 0.4; filter: grayscale(1); border-left-color: #444; }
        .my-role-box { background: linear-gradient(to right, #2c0000, #1a1a1a); padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid var(--gold); }
        .hidden { display: none !important; }
        .action-btn { background: transparent; border: 1px solid var(--gold); color: white; margin: 5px; padding: 10px; width: 45%; border-radius: 5px; cursor: pointer; }
        #teammate-info { font-weight: bold; color: #ff4444; margin-top: 10px; font-size: 0.9rem; }
        #status-label { background: #222; padding: 5px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 10px; text-align: center; color: var(--gold); }
        .night-result { color: #2ecc71; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen" class="container">
    <h1>WOLF COMMUNITY</h1>
    <div id="host-only-badge" class="hidden" style="color:var(--gold); font-size:0.8rem; margin-bottom:10px; text-align:center;">【ホストモード】</div>
    <input type="text" id="room-id" placeholder="合言葉 (Room ID)">
    <input type="text" id="player-name" placeholder="あなたの名前">
    <button id="join-btn" class="main-btn">入室する</button>
</div>

<div id="game-screen" class="container hidden">
    <div id="status-label">待機中</div>
    
    <div id="host-panel" class="hidden">
        <div id="setup-area" class="setup-box">
            <p style="color: var(--gold); margin: 0 0 10px 0; font-weight: bold;">役職構成</p>
            <div id="role-list"></div>
            <button id="start-game-btn" class="main-btn">ゲーム開始</button>
        </div>
        <div style="display:flex; gap:5px;">
            <button id="go-to-vote-btn" class="main-btn hidden" style="background:#e74c3c; flex:1;">投票へ</button>
            <button id="go-to-night-btn" class="main-btn hidden" style="background:#2c3e50; flex:1;">夜へ</button>
        </div>
    </div>

    <div id="role-display" class="my-role-box hidden">
        <span style="font-size: 0.7rem; color: #aaa;">あなたの役職</span><br>
        <strong id="my-role-name" style="font-size: 1.4rem; color: var(--gold);">? ? ?</strong>
        <div id="teammate-info"></div>
    </div>

    <div id="action-panel" class="hidden" style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; border:1px solid var(--gold); margin-bottom:10px;">
        <p id="action-msg" style="font-weight:bold; margin:0 0 10px 0;"></p>
        <div id="action-buttons"></div>
    </div>

    <div id="player-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDlorUmU3Ik_7-FG_S6VoylkM5ivYvuOoA",
        authDomain: "my-jinro-game.firebaseapp.com",
        projectId: "my-jinro-game",
        databaseURL: "https://my-jinro-game-default-rtdb.firebaseio.com",
        storageBucket: "my-jinro-game.firebasestorage.app",
        messagingSenderId: "534900473912",
        appId: "1:534900473912:web:18feed00b63f5879d466cd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const isHostMode = urlParams.get('mode') === 'host';
    if (isHostMode) document.getElementById('host-only-badge').classList.remove('hidden');

    let myName = "", currentRoom = "";
    const rolesData = [
        { id: 'wolf', name: '人狼', count: 1 },
        { id: 'uranai', name: '占い師', count: 1 },
        { id: 'reibai', name: '霊媒師', count: 1 },
        { id: 'kishi', name: '騎士', count: 1 }
    ];

    function renderRoleSetup() {
        const div = document.getElementById('role-list'); div.innerHTML = "";
        rolesData.forEach(role => {
            const row = document.createElement('div'); row.className = 'role-row';
            row.innerHTML = `<span>${role.name}</span><div class="count-controls"><button class="count-btn" data-id="${role.id}" data-delta="-1">-</button><span id="count-${role.id}">${role.count}</span><button class="count-btn" data-id="${role.id}" data-delta="1">+</button></div>`;
            div.appendChild(row);
        });
    }

    document.addEventListener('click', e => {
        if (e.target.classList.contains('count-btn')) {
            const id = e.target.dataset.id;
            const role = rolesData.find(r => r.id === id);
            role.count = Math.max(0, role.count + parseInt(e.target.dataset.delta));
            document.getElementById(`count-${id}`).innerText = role.count;
        }
    });

    document.getElementById('join-btn').onclick = () => {
        const roomId = document.getElementById('room-id').value;
        myName = document.getElementById('player-name').value;
        if (!roomId || !myName) return alert("入力してください");
        currentRoom = roomId;

        set(ref(db, `rooms/${roomId}/players/${myName}`), { name: myName, role: "未割当", alive: true, vote: "", nightAction: "" });
        onDisconnect(ref(db, `rooms/${roomId}/players/${myName}`)).remove();

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');

        if (isHostMode) {
            document.getElementById('host-panel').classList.remove('hidden');
            renderRoleSetup();
            update(ref(db, `rooms/${roomId}/config`), { phase: "waiting" });
        }

        onValue(ref(db, `rooms/${roomId}`), snapshot => {
            const data = snapshot.val(); if (!data) return;
            const players = data.players || {};
            const config = data.config || {};
            const myData = players[myName];

            document.getElementById('status-label').innerText = 
                config.phase === "playing" ? "🗣️ 話し合い中" : (config.phase === "voting" ? "⚖️ 投票中" : (config.phase === "night" ? "🌙 夜の行動中" : "待機中"));

            const listDiv = document.getElementById('player-list'); listDiv.innerHTML = "";
            Object.keys(players).forEach(n => {
                listDiv.innerHTML += `<div class="player-card ${players[n].alive ? '' : 'dead'}"><span>👤 ${n}</span><span>${players[n].alive ? '生存' : '死亡'}</span></div>`;
            });

            if (myData && myData.role !== "未割当") {
                document.getElementById('role-display').classList.remove('hidden');
                document.getElementById('my-role-name').innerText = myData.role;
                
                if (myData.role === "人狼") {
                    const partners = Object.keys(players).filter(n => players[n].role === "人狼" && n !== myName);
                    let info = partners.length > 0 ? "仲間の人狼: " + partners.join(", ") : "仲間はいません";
                    partners.forEach(p => {
                        if (players[p].nightAction) info += `<br><span style="color:yellow">仲間の狙い: ${players[p].nightAction}</span>`;
                    });
                    document.getElementById('teammate-info').innerHTML = info;
                }
            }

            const actionPanel = document.getElementById('action-panel');
            const btnArea = document.getElementById('action-buttons');
            const msg = document.getElementById('action-msg');
            
            if (config.phase === "voting" && myData.alive) {
                actionPanel.classList.remove('hidden');
                msg.innerText = "追放投票：誰か選んでください";
                btnArea.innerHTML = "";
                Object.keys(players).forEach(n => {
                    if (players[n].alive && n !== myName) {
                        const b = document.createElement('button'); b.innerText = n; b.className = "action-btn";
                        b.onclick = () => { update(ref(db, `rooms/${currentRoom}/players/${myName}`), { vote: n }); btnArea.innerHTML = "投票完了"; };
                        btnArea.appendChild(b);
                    }
                });
            } else if (config.phase === "night" && myData.alive) {
                actionPanel.classList.remove('hidden');
                btnArea.innerHTML = "";
                
                if (myData.role === "人狼") {
                    msg.innerText = "襲撃：誰を殺しますか？";
                    Object.keys(players).forEach(n => {
                        if (players[n].alive && players[n].role !== "人狼") {
                            const b = document.createElement('button'); b.innerText = n; b.className = "action-btn";
                            b.onclick = () => update(ref(db, `rooms/${currentRoom}/players/${myName}`), { nightAction: n });
                            btnArea.appendChild(b);
                        }
                    });
                } else if (myData.role === "占い師") {
                    msg.innerText = "占い：正体を知りたい人を選択";
                    Object.keys(players).forEach(n => {
                        if (players[n].alive && n !== myName) {
                            const b = document.createElement('button'); b.innerText = n; b.className = "action-btn";
                            b.onclick = () => {
                                const res = players[n].role === "人狼" ? "【人狼】" : "【市民側（人間）】";
                                btnArea.innerHTML = `<p class="night-result">${n}さんは ${res} です</p>`;
                            };
                            btnArea.appendChild(b);
                        }
                    });
                } else if (myData.role === "霊媒師") {
                    msg.innerText = "霊媒：直前に死んだ人の霊をみます";
                    const lastDead = config.lastDead;
                    if (lastDead && players[lastDead]) {
                        const b = document.createElement('button'); b.innerText = lastDead + "を視る"; b.className = "action-btn";
                        b.onclick = () => {
                            const res = players[lastDead].role === "人狼" ? "【人狼】" : "【市民側（人間）】";
                            btnArea.innerHTML = `<p class="night-result">${lastDead}さんは ${res} でした</p>`;
                        };
                        btnArea.appendChild(b);
                    } else { btnArea.innerHTML = "まだ誰も死んでいません"; }
                } else if (myData.role === "騎士") {
                    msg.innerText = "護衛：今夜誰を守りますか？";
                    Object.keys(players).forEach(n => {
                        if (players[n].alive && n !== myName) {
                            const b = document.createElement('button'); b.innerText = n; b.className = "action-btn";
                            b.onclick = () => { update(ref(db, `rooms/${currentRoom}/players/${myName}`), { nightAction: n }); btnArea.innerHTML = "護衛中..."; };
                            btnArea.appendChild(b);
                        }
                    });
                } else {
                    msg.innerText = "推理：誰が一番怪しいと思いますか？";
                    Object.keys(players).forEach(n => {
                        if (players[n].alive && n !== myName) {
                            const b = document.createElement('button'); b.innerText = n; b.className = "action-btn";
                            b.onclick = () => { btnArea.innerHTML = `<p>${n} さんをマークしました。朝に備えましょう。</p>`; };
                            btnArea.appendChild(b);
                        }
                    });
                }
            } else {
                actionPanel.classList.add('hidden');
            }

            if (isHostMode) {
                document.getElementById('go-to-vote-btn').classList.toggle('hidden', config.phase !== "playing");
                document.getElementById('go-to-night-btn').classList.toggle('hidden', config.phase !== "playing" && config.phase !== "night");
                if (config.phase === "night") {
                    document.getElementById('go-to-night-btn').innerText = "夜明け";
                    document.getElementById('go-to-night-btn').onclick = () => processMorning(players);
                } else {
                    document.getElementById('go-to-night-btn').innerText = "夜へ";
                    document.getElementById('go-to-night-btn').onclick = () => update(ref(db, `rooms/${currentRoom}/config`), { phase: "night" });
                }
            }
            if (isHostMode && config.phase === "voting") checkTally(players, currentRoom);
        });
    };

    document.getElementById('start-game-btn').onclick = () => {
        onValue(ref(db, `rooms/${currentRoom}/players`), s => {
            const names = Object.keys(s.val());
            let roles = [];
            rolesData.forEach(r => { for(let i=0; i<r.count; i++) roles.push(r.name); });
            while(roles.length < names.length) roles.push("市民");
            roles.sort(() => Math.random() - 0.5);
            let up = { "config/phase": "playing", "config/lastDead": "" };
            names.forEach((n, i) => { up[`players/${n}/role`] = roles[i]; up[`players/${n}/alive`] = true; up[`players/${n}/vote`] = ""; up[`players/${n}/nightAction`] = ""; });
            update(ref(db, `rooms/${currentRoom}`), up);
            document.getElementById('setup-area').classList.add('hidden');
        }, { onlyOnce: true });
    };

    document.getElementById('go-to-vote-btn').onclick = () => update(ref(db, `rooms/${currentRoom}/config`), { phase: "voting" });

    // 朝の処理：ランダム襲撃ロジック
    function processMorning(players) {
        const wolfPlayers = Object.keys(players).filter(n => players[n].alive && players[n].role === "人狼");
        const kishiPlayers = Object.keys(players).filter(n => players[n].alive && players[n].role === "騎士");

        // 人狼たちの選択（重複なしで抽出）
        const wolfChoices = [...new Set(wolfPlayers.map(n => players[n].nightAction).filter(a => a !== ""))];
        
        let selectedTarget = "";
        if (wolfChoices.length > 0) {
            // ★意見がそろわなくても、選ばれたリストからランダムで決定
            selectedTarget = wolfChoices[Math.floor(Math.random() * wolfChoices.length)];
        }

        // 騎士の守り
        let kishiTarget = "";
        if (kishiPlayers.length > 0) {
            kishiTarget = players[kishiPlayers[0]].nightAction;
        }

        let dead = "";
        let message = "";

        if (selectedTarget === "") {
            message = "人狼は今夜、誰も襲わなかったようです。";
        } else if (selectedTarget === kishiTarget) {
            message = "人狼が襲撃しましたが、騎士が守りきりました！";
        } else {
            dead = selectedTarget;
            message = dead + " さんが無残な姿で見つかりました。";
        }

        let up = { "config/phase": "playing" };
        if (dead) {
            up[`players/${dead}/alive`] = false;
            up["config/lastDead"] = dead;
        }

        Object.keys(players).forEach(n => {
            up[`players/${n}/nightAction`] = "";
            up[`players/${n}/vote`] = "";
        });

        alert("朝になりました。\n" + message);
        update(ref(db, `rooms/${currentRoom}`), up);
    }

    function checkTally(players, rId) {
        const alives = Object.keys(players).filter(n => players[n].alive);
        const votes = alives.map(n => players[n].vote).filter(v => v !== "");
        if (votes.length > 0 && votes.length === alives.length) {
            let counts = {}; votes.forEach(v => counts[v] = (counts[v] || 0) + 1);
            const target = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            let up = { "config/phase": "playing", "config/lastDead": target };
            up[`players/${target}/alive`] = false;
            alives.forEach(n => up[`players/${n}/vote`] = "");
            alert(target + "さんを追放しました。");
            update(ref(db, `rooms/${rId}`), up);
        }
    }
</script>
</body>
</html>
